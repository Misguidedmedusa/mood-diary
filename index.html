<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Rhythm of My Days</title>
    <style>
        :root {
            --sage-green: #b2ac88;
            --grid-color: #e8e8e8;
            --text-main: #4a4a4a;
        }

        body {
            background-color: #faf9f6;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 25px 25px;
            font-family: 'Georgia', serif;
            color: var(--text-main);
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid var(--sage-green); width: 100%; max-width: 600px; padding-bottom: 10px;}
        .container { width: 100%; max-width: 600px; padding-bottom: 200px; }

        .entry-row { 
            display: flex; align-items: flex-start; margin-bottom: 12px; padding: 15px; 
            border-radius: 12px; position: relative; border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.02);
        }

        .day-info { font-weight: bold; min-width: 85px; font-size: 0.8rem; line-height: 1.2; }
        .content-area { flex-grow: 1; outline: none; padding-left: 15px; min-height: 24px; font-size: 1rem; }

        .delete-btn { cursor: pointer; font-size: 1.2rem; color: #bbb; border: none; background: none; margin-left: 5px; }

        /* Step Slider Styles */
        .controls-panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.98);
            padding: 20px; border-top: 1px solid var(--sage-green);
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }

        .step-slider {
            width: 80%; max-width: 400px; appearance: none; height: 8px; border-radius: 5px;
            background: linear-gradient(to right, #9400D3, #0000FF, #00FF00, #FF7F00, #FF0000);
            outline: none;
        }
        .step-slider::-webkit-slider-thumb {
            appearance: none; width: 24px; height: 24px; background: white; 
            border: 3px solid var(--sage-green); border-radius: 50%; cursor: pointer;
        }

        #analysis {
            margin-bottom: 20px; padding: 15px; background: rgba(255,255,255,0.8);
            border: 1px solid var(--sage-green); border-radius: 10px;
            width: 100%; max-width: 550px; font-size: 0.85rem;
        }

        .btn-group { display: flex; gap: 15px; }
        button { padding: 12px 25px; border-radius: 25px; border: none; cursor: pointer; font-weight: bold; background: var(--sage-green); color: white; }
        .btn-period { background: #e5989b; }
        
        .level-labels { display: flex; justify-content: space-between; width: 80%; max-width: 400px; font-size: 0.7rem; color: #888; margin-top: -10px; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="color: var(--sage-green); font-style: italic; margin-bottom: 5px;">The Rhythm of My Days</h2>
        <small style="letter-spacing: 1px; color: #888;">LAB WORK • LIFE • MOMENTS</small>
    </div>

    <div id="analysis">
        <div id="stats-content">Start your first log below...</div>
    </div>

    <div class="container" id="diary-container"></div>

    <div class="controls-panel">
        <input type="range" id="stepRange" class="step-slider" min="1" max="5" step="1" value="3">
        <div class="level-labels">
            <span>Resting</span>
            <span>Low</span>
            <span>Steady</span>
            <span>Active</span>
            <span>Peak</span>
        </div>
        
        <div class="btn-group">
            <button onclick="addEntry('mood')">Log Mindset</button>
            <button class="btn-period" onclick="addEntry('period')">+ Period Day</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('diary-container');

        const vibgyoMap = {
            1: { name: "Violet", color: "rgba(148, 0, 211, 0.2)", label: "Resting" },
            2: { name: "Blue", color: "rgba(0, 0, 255, 0.2)", label: "Low" },
            3: { name: "Green", color: "rgba(0, 255, 0, 0.2)", label: "Steady" },
            4: { name: "Orange", color: "rgba(255, 127, 0, 0.2)", label: "Active" },
            5: { name: "Red", color: "rgba(255, 0, 0, 0.2)", label: "Peak" }
        };

        function addEntry(type) {
            const date = new Date();
            const dateStr = date.toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric' });
            const step = document.getElementById('stepRange').value;
            
            const bgColor = (type === 'period') ? 'rgba(229, 152, 155, 0.5)' : vibgyoMap[step].color;
            const moodLabel = (type === 'period') ? 'CYCLE' : vibgyoMap[step].label;

            const div = document.createElement('div');
            div.className = 'entry-row';
            div.style.backgroundColor = bgColor;
            div.setAttribute('data-val', type === 'period' ? 'P' : step);

            div.innerHTML = `
                <div class="day-info">${dateStr}<br><small>${moodLabel}</small></div>
                <div class="content-area" contenteditable="true" oninput="saveAndAnalyze()">...</div>
                <button class="delete-btn" onclick="this.parentElement.remove(); saveAndAnalyze();">×</button>
            `;
            container.prepend(div);
            saveAndAnalyze();
        }

        function saveAndAnalyze() {
            localStorage.setItem('diary_rhythm', container.innerHTML);
            const rows = document.querySelectorAll('.entry-row');
            let totalSteps = 0;
            let moodCount = 0;
            let lastPeriod = "Not logged yet";

            rows.forEach((row) => {
                const val = row.getAttribute('data-val');
                if(val === 'P') {
                    if(lastPeriod === "Not logged yet") lastPeriod = row.querySelector('.day-info').innerText.split('\n')[0];
                } else {
                    totalSteps += parseInt(val);
                    moodCount++;
                }
            });

            const avg = moodCount > 0 ? Math.round(totalSteps / moodCount) : 0;
            const trend = vibgyoMap[avg] ? vibgyoMap[avg].label : "Calibrating";

            document.getElementById('stats-content').innerHTML = `
                Current Rhythm: <strong>${trend}</strong> | Last Cycle Day: <strong>${lastPeriod}</strong>
            `;
        }

        window.onload = () => {
            const saved = localStorage.getItem('diary_rhythm');
            if(saved) container.innerHTML = saved;
            saveAndAnalyze();
        };
    </script>
</body>
</html>
