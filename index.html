<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Rhythm of My Days</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --sage-green: #b2ac88;
            --soft-bg: #faf9f6;
            --grid-color: rgba(232, 232, 232, 0.6);
            --text-main: #4a4a4a;
            /* New Period Color: Distinct Earthy Terracotta */
            --period-bg: rgba(188, 108, 108, 0.45); 
        }

        body {
            background-color: var(--soft-bg);
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 25px 25px;
            font-family: 'Georgia', serif;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Restoring the Old Heading Style */
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid var(--sage-green); width: 100%; max-width: 550px; padding-bottom: 10px; margin-top: 30px; }
        .header h2 { color: var(--sage-green); font-style: italic; margin-bottom: 5px; font-weight: normal; font-size: 1.8rem; }
        .header small { letter-spacing: 1px; color: #888; font-family: sans-serif; font-size: 0.7rem; }

        #analysis {
            background: rgba(255, 255, 255, 0.7);
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            max-width: 500px;
            font-size: 0.85rem;
            text-align: center;
            border: 1px solid var(--sage-green);
            margin-bottom: 20px;
        }

        .container { width: 100%; max-width: 550px; padding-bottom: 220px; }

        .entry-row { 
            display: flex; align-items: flex-start; margin-bottom: 12px; padding: 15px; 
            border-radius: 12px; position: relative; border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.02);
        }

        .day-info { font-weight: bold; min-width: 85px; font-size: 0.8rem; line-height: 1.2; }
        .content-area { flex-grow: 1; outline: none; padding-left: 15px; min-height: 24px; font-size: 1rem; }

        /* Restoring the Delete Feature */
        .delete-btn { cursor: pointer; font-size: 1.2rem; color: #bbb; border: none; background: none; margin-left: 8px; font-family: sans-serif; }
        .delete-btn:hover { color: #e5989b; }

        /* Minimal Slider & Buttons */
        .controls-panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.98);
            padding: 20px 20px 40px 20px;
            border-top: 1px solid var(--sage-green);
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            z-index: 1000;
        }

        .slider-wrapper { width: 85%; max-width: 400px; }
        .step-slider { width: 100%; appearance: none; height: 5px; background: #eee; border-radius: 5px; outline: none; }
        .step-slider::-webkit-slider-thumb {
            appearance: none; width: 22px; height: 22px; background: white; 
            border: 2px solid var(--sage-green); border-radius: 50%; cursor: pointer;
        }

        .labels { display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.7rem; color: #999; }

        .btn-group { display: flex; gap: 15px; width: 85%; max-width: 400px; }
        button { flex: 1; padding: 12px; border-radius: 20px; border: none; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
        .btn-log { background: var(--sage-green); color: white; }
        .btn-period { background: #e8dcd8; color: #8a6c6c; }

    </style>
</head>
<body>

    <div class="header">
        <h2>The Rhythm of My Days</h2>
        <small>LAB WORK • LIFE • MOMENTS</small>
    </div>

    <div id="analysis">
        <div id="stats-content">Ready for today's entry...</div>
    </div>

    <div class="container" id="diary-container"></div>

    <div class="controls-panel">
        <div class="slider-wrapper">
            <input type="range" id="stepRange" class="step-slider" min="1" max="5" step="1" value="3">
            <div class="labels">
                <span>Rest</span>
                <span>Low</span>
                <span>Steady</span>
                <span>Active</span>
                <span>Peak</span>
            </div>
        </div>
        
        <div class="btn-group">
            <button class="btn-log" onclick="addEntry('mood')">Log Mindset</button>
            <button class="btn-period" onclick="addEntry('period')">+ Cycle</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('diary-container');

        // Mood Palette - Peak (5) is now a vibrant True Red
        const moodPalette = {
            1: { color: "rgba(148, 0, 211, 0.2)", label: "Resting" }, // Violet
            2: { color: "rgba(0, 0, 255, 0.15)", label: "Low" },      // Blue
            3: { color: "rgba(178, 172, 136, 0.3)", label: "Steady" },  // Sage
            4: { color: "rgba(255, 127, 0, 0.2)", label: "Active" },   // Orange
            5: { color: "rgba(255, 0, 0, 0.35)", label: "Peak" }       // Strong Red
        };

        function addEntry(type) {
            const date = new Date();
            const dateStr = date.toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric' });
            const step = document.getElementById('stepRange').value;
            
            // Period is now a dusty terracotta/brownish-pink to differentiate from Peak Red
            const bgColor = (type === 'period') ? 'var(--period-bg)' : moodPalette[step].color;
            const label = (type === 'period') ? 'Cycle' : moodPalette[step].label;

            const div = document.createElement('div');
            div.className = 'entry-row';
            div.style.backgroundColor = bgColor;
            div.setAttribute('data-val', type === 'period' ? 'P' : step);

            div.innerHTML = `
                <div class="day-info">${dateStr}<br><small>${label}</small></div>
                <div class="content-area" contenteditable="true" oninput="saveAndAnalyze()">...</div>
                <button class="delete-btn" onclick="deleteEntry(this)">×</button>
            `;
            container.prepend(div);
            saveAndAnalyze();
        }

        function deleteEntry(btn) {
            btn.parentElement.remove();
            saveAndAnalyze();
        }

        function saveAndAnalyze() {
            localStorage.setItem('diary_final_v1', container.innerHTML);
            const rows = document.querySelectorAll('.entry-row');
            let total = 0, count = 0, lastP = "None";

            rows.forEach((row) => {
                const v = row.getAttribute('data-val');
                if(v === 'P') { 
                    if(lastP === "None") lastP = row.querySelector('.day-info').innerText.split('\n')[0]; 
                } else { 
                    total += parseInt(v); count++; 
                }
            });

            const avg = count > 0 ? Math.round(total / count) : 3;
            const moodLabel = moodPalette[avg] ? moodPalette[avg].label : "Steady";
            document.getElementById('stats-content').innerHTML = 
                `Current Rhythm: <strong>${moodLabel}</strong> | Last Cycle: <strong>${lastP}</strong>`;
        }

        window.onload = () => {
            const saved = localStorage.getItem('diary_final_v1');
            if(saved) container.innerHTML = saved;
            saveAndAnalyze();
        };
    </script>
</body>
</html>
