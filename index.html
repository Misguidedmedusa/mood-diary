<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Rhythm of My Days</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MyRhythm">
    
    <style>
        :root {
            --sage-green: #b2ac88;
            --soft-bg: #faf9f6;
            --grid-color: rgba(232, 232, 232, 0.6);
            --text-main: #5a5a5a;
        }

        body {
            background-color: var(--soft-bg);
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 25px 25px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Georgia, serif;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

        .header { text-align: center; margin-bottom: 25px; margin-top: 40px; width: 100%; max-width: 500px; }
        .header h2 { color: var(--sage-green); font-weight: 300; font-style: italic; letter-spacing: 1px; margin-bottom: 5px; }
        
        #analysis {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(5px);
            border-radius: 15px;
            padding: 12px;
            width: 90%;
            max-width: 450px;
            font-size: 0.8rem;
            text-align: center;
            border: 1px solid rgba(178, 172, 136, 0.3);
            margin-bottom: 20px;
        }

        .container { width: 100%; max-width: 500px; padding-bottom: 220px; }

        .entry-row { 
            display: flex; align-items: flex-start; margin-bottom: 12px; padding: 18px; 
            border-radius: 16px; position: relative;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .day-info { font-weight: bold; min-width: 70px; font-size: 0.75rem; color: #777; }
        .content-area { flex-grow: 1; outline: none; padding-left: 12px; font-size: 1rem; line-height: 1.4; color: #444; }

        .delete-btn { cursor: pointer; font-size: 1.2rem; color: #ccc; border: none; background: none; padding: 0 5px; }

        /* Minimalist Aesthetic Slider */
        .controls-panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(250, 249, 246, 0.95);
            backdrop-filter: blur(10px);
            padding: 25px 20px 40px 20px;
            border-top: 1px solid rgba(0,0,0,0.05);
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            z-index: 1000;
        }

        .slider-wrapper { width: 85%; max-width: 350px; position: relative; }
        
        .step-slider {
            width: 100%; appearance: none; height: 4px; background: #e0e0e0; border-radius: 2px; outline: none;
        }

        .step-slider::-webkit-slider-thumb {
            appearance: none; width: 22px; height: 22px; background: white; 
            border: 2px solid var(--sage-green); border-radius: 50%; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .labels { display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.65rem; color: #999; letter-spacing: 1px; text-transform: uppercase; }

        .btn-group { display: flex; gap: 15px; width: 85%; max-width: 350px; }
        button { 
            flex: 1; padding: 14px; border-radius: 12px; border: none; cursor: pointer; 
            font-weight: 500; font-size: 0.9rem; transition: 0.2s;
        }
        .btn-log { background: var(--sage-green); color: white; }
        .btn-period { background: #e8dcd8; color: #a67c7c; }
        button:active { transform: scale(0.98); opacity: 0.9; }

    </style>
</head>
<body>

    <div class="header">
        <h2>the rhythm of my days</h2>
    </div>

    <div id="analysis">
        <div id="stats-content">waiting for your first light...</div>
    </div>

    <div class="container" id="diary-container"></div>

    <div class="controls-panel">
        <div class="slider-wrapper">
            <input type="range" id="stepRange" class="step-slider" min="1" max="5" step="1" value="3">
            <div class="labels">
                <span>Rest</span>
                <span>Low</span>
                <span>Steady</span>
                <span>High</span>
                <span>Peak</span>
            </div>
        </div>
        
        <div class="btn-group">
            <button class="btn-log" onclick="addEntry('mood')">Log Mindset</button>
            <button class="btn-period" onclick="addEntry('period')">Cycle</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('diary-container');

        // Aesthetic VIBGYO - Muted Watercolor Tones
        const moodPalette = {
            1: { color: "rgba(180, 160, 200, 0.25)", label: "Resting" }, // Muted Violet
            2: { color: "rgba(160, 180, 210, 0.25)", label: "Low" },     // Muted Blue
            3: { color: "rgba(178, 172, 136, 0.25)", label: "Steady" },  // Sage
            4: { color: "rgba(230, 200, 160, 0.25)", label: "Active" },  // Soft Orange
            5: { color: "rgba(220, 150, 150, 0.25)", label: "Peak" }    // Soft Red
        };

        function addEntry(type) {
            const date = new Date();
            const dateStr = date.toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric' });
            const step = document.getElementById('stepRange').value;
            
            const bgColor = (type === 'period') ? 'rgba(215, 180, 180, 0.3)' : moodPalette[step].color;
            const label = (type === 'period') ? 'Cycle' : moodPalette[step].label;

            const div = document.createElement('div');
            div.className = 'entry-row';
            div.style.backgroundColor = bgColor;
            div.setAttribute('data-val', type === 'period' ? 'P' : step);

            div.innerHTML = `
                <div class="day-info">${dateStr}<br>${label}</div>
                <div class="content-area" contenteditable="true" oninput="saveAndAnalyze()">...</div>
                <button class="delete-btn" onclick="this.parentElement.remove(); saveAndAnalyze();">×</button>
            `;
            container.prepend(div);
            saveAndAnalyze();
        }

        function saveAndAnalyze() {
            localStorage.setItem('diary_pwa_v1', container.innerHTML);
            const rows = document.querySelectorAll('.entry-row');
            let total = 0, count = 0, lastP = "None";

            rows.forEach((row) => {
                const v = row.getAttribute('data-val');
                if(v === 'P') { if(lastP === "None") lastP = row.querySelector('.day-info').innerText.split('\n')[0]; }
                else { total += parseInt(v); count++; }
            });

            const avg = count > 0 ? Math.round(total / count) : 0;
            const mood = moodPalette[avg] ? moodPalette[avg].label : "Steady";
            document.getElementById('stats-content').innerHTML = 
                `Average: <b>${mood}</b> &nbsp; | &nbsp; Last Cycle: <b>${lastP}</b>`;
        }

        window.onload = () => {
            const saved = localStorage.getItem('diary_pwa_v1');
            if(saved) container.innerHTML = saved;
            saveAndAnalyze();
        };
    </script>
</body>
</html>
