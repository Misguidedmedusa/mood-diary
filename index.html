<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Research & Life Tracker</title>
    <style>
        :root {
            --sage-green: #b2ac88;
            --muted-sage: #d4d0b8;
            --grid-color: #e8e8e8;
            --text-main: #555;
            /* Motivation Palette */
            --m-high: rgba(129, 199, 132, 0.6); /* Green */
            --m-mid: rgba(255, 213, 79, 0.6);  /* Yellow/Orange */
            --m-low: rgba(144, 202, 249, 0.6);  /* Blue */
            --period-color: rgba(239, 154, 154, 0.7); /* Muted Red */
        }

        body {
            background-color: #faf9f6;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 25px 25px;
            font-family: 'Georgia', serif;
            color: var(--text-main);
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--sage-green); padding-bottom: 10px; }
        .container { width: 100%; max-width: 600px; background: rgba(255,255,255,0.7); padding: 20px; border-radius: 15px; }

        .entry-row { display: flex; align-items: flex-start; margin-bottom: 20px; padding: 10px; border-radius: 8px; transition: 0.3s; }
        .day-info { font-weight: bold; min-width: 90px; color: var(--sage-green); font-size: 0.9rem; }
        
        .content-area { flex-grow: 1; outline: none; border-left: 2px solid var(--muted-sage); padding-left: 15px; min-height: 20px; }

        /* Status Pills */
        .status-tag { font-size: 0.7rem; text-transform: uppercase; padding: 2px 8px; border-radius: 10px; margin-left: 10px; font-weight: bold; }
        .period-tag { background: var(--period-color); color: white; margin-top: 5px; display: inline-block; }

        /* Analysis Section */
        #analysis {
            margin-top: 40px;
            padding: 20px;
            background: white;
            border: 1px solid var(--sage-green);
            border-radius: 10px;
            width: 100%;
            max-width: 550px;
        }

        .controls { position: fixed; bottom: 20px; display: flex; gap: 10px; }
        button { 
            padding: 12px 20px; border-radius: 25px; border: none; cursor: pointer; 
            font-weight: bold; background: var(--sage-green); color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-period { background: #e5989b; }

    </style>
</head>
<body>

    <div class="header">
        <h2 style="color: var(--sage-green); margin: 0;">Monthly Cycle & Mindset</h2>
        <small>Tracking patterns, one day at a time.</small>
    </div>

    <div class="container" id="diary-container"></div>

    <div id="analysis">
        <h3 style="color: var(--sage-green);">Monthly Insight</h3>
        <p id="stats-text">Add entries to see your motivation vs. cycle analysis.</p>
    </div>

    <div class="controls">
        <button onclick="addEntry('motivated')">High Energy</button>
        <button onclick="addEntry('low')">Low Energy</button>
        <button class="btn-period" onclick="addEntry('period')">+ Period Day</button>
    </div>

    <script>
        const container = document.getElementById('diary-container');

        function addEntry(type) {
            const date = new Date();
            const dateStr = date.toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short' });
            
            const div = document.createElement('div');
            div.className = 'entry-row';
            
            let bgColor = 'transparent';
            let tag = '';
            
            if(type === 'motivated') { bgColor = 'var(--m-high)'; tag = 'High Motivation'; }
            if(type === 'low') { bgColor = 'var(--m-low)'; tag = 'Resting'; }
            if(type === 'period') { bgColor = 'var(--period-color)'; tag = 'Period Cycle'; }

            div.style.backgroundColor = bgColor;

            div.innerHTML = `
                <div class="day-info">
                    ${dateStr}<br>
                    <span class="status-tag">${tag}</span>
                </div>
                <div class="content-area" contenteditable="true" oninput="saveAndAnalyze()">...</div>
            `;
            
            container.prepend(div);
            saveAndAnalyze();
        }

        function saveAndAnalyze() {
            const html = container.innerHTML;
            localStorage.setItem('diary_v2', html);
            
            // Basic Analysis Logic
            const entries = document.querySelectorAll('.entry-row').length;
            const periods = document.querySelectorAll('.status-tag').textContent === 'Period Cycle'; // simplified
            let periodCount = 0;
            document.querySelectorAll('.status-tag').forEach(t => { if(t.innerText.includes('Period')) periodCount++; });
            
            const stats = document.getElementById('stats-text');
            stats.innerHTML = `Total Logged Days: <b>${entries}</b> | Period Days: <b>${periodCount}</b><br>
            <small>Tip: Look for clusters of "Resting" tags 2-3 days before a "Period Cycle" tag to predict your dip.</small>`;
        }

        window.onload = () => {
            const saved = localStorage.getItem('diary_v2');
            if(saved) container.innerHTML = saved;
        };
    </script>
</body>
</html>
