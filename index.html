<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBGYO Mindset Tracker</title>
    <style>
        :root {
            --sage-green: #b2ac88;
            --grid-color: #e8e8e8;
            --text-main: #4a4a4a;
        }

        body {
            background-color: #faf9f6;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 25px 25px;
            font-family: 'Georgia', serif;
            color: var(--text-main);
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid var(--sage-green); width: 100%; max-width: 600px; }
        .container { width: 100%; max-width: 600px; padding-bottom: 180px; }

        .entry-row { 
            display: flex; align-items: flex-start; margin-bottom: 12px; padding: 15px; 
            border-radius: 12px; position: relative; border: 1px solid rgba(0,0,0,0.05);
        }

        .day-info { font-weight: bold; min-width: 85px; font-size: 0.8rem; line-height: 1.2; }
        .content-area { flex-grow: 1; outline: none; padding-left: 15px; min-height: 24px; font-size: 1rem; }

        .delete-btn { cursor: pointer; font-size: 1.2rem; color: #999; border: none; background: none; margin-left: 5px; }

        /* VIBGYO Slider Styles */
        .controls-panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.96);
            padding: 15px; border-top: 2px solid var(--sage-green);
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }

        .vibgyo-slider {
            width: 80%; max-width: 400px; height: 10px;
            border-radius: 5px; outline: none; appearance: none;
            background: linear-gradient(to right, #9400D3, #4B0082, #0000FF, #00FF00, #FFFF00, #FF7F00, #FF0000);
        }
        .vibgyo-slider::-webkit-slider-thumb { appearance: none; width: 20px; height: 20px; background: white; border: 2px solid var(--sage-green); border-radius: 50%; cursor: pointer; }

        #analysis {
            margin-bottom: 20px; padding: 15px; background: white;
            border: 1px solid var(--sage-green); border-radius: 10px;
            width: 100%; max-width: 550px; font-size: 0.85rem; line-height: 1.4;
        }

        .btn-group { display: flex; gap: 10px; }
        button { padding: 10px 20px; border-radius: 20px; border: none; cursor: pointer; font-weight: bold; background: var(--sage-green); color: white; }
        .btn-period { background: #e5989b; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="color: var(--sage-green);">VIBGYO Analysis</h2>
    </div>

    <div id="analysis">
        <strong>Monthly Insights:</strong>
        <div id="stats-content">Logging your first day...</div>
    </div>

    <div class="container" id="diary-container"></div>

    <div class="controls-panel">
        <div style="font-size: 0.8rem; color: #666;">
            Low Energy (V) <span style="margin: 0 40px;">→</span> High Energy (R)
        </div>
        <input type="range" id="vibRange" class="vibgyo-slider" min="0" max="100" value="50">
        
        <div class="btn-group">
            <button onclick="addEntry('mood')">Log Entry</button>
            <button class="btn-period" onclick="addEntry('period')">+ Period Day</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('diary-container');

        function getVibgyoColor(value) {
            const colors = [
                {p: 0, r: 148, g: 0, b: 211},   // Violet
                {p: 17, r: 75, g: 0, b: 130},  // Indigo
                {p: 33, r: 0, g: 0, b: 255},   // Blue
                {p: 50, r: 0, g: 255, b: 0},   // Green
                {p: 67, r: 255, g: 255, b: 0}, // Yellow
                {p: 83, r: 255, g: 127, b: 0}, // Orange
                {p: 100, r: 255, g: 0, b: 0}   // Red
            ];
            
            let lower = colors[0];
            let upper = colors[colors.length - 1];
            for (let i = 0; i < colors.length - 1; i++) {
                if (value >= colors[i].p && value <= colors[i+1].p) {
                    lower = colors[i];
                    upper = colors[i+1];
                    break;
                }
            }
            const range = upper.p - lower.p;
            const factor = (value - lower.p) / (range || 1);
            const r = Math.floor(lower.r + factor * (upper.r - lower.r));
            const g = Math.floor(lower.g + factor * (upper.g - lower.g));
            const b = Math.floor(lower.b + factor * (upper.b - lower.b));
            return `rgba(${r}, ${g}, ${b}, 0.25)`;
        }

        function addEntry(type) {
            const date = new Date();
            const dateStr = date.toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric' });
            const val = document.getElementById('vibRange').value;
            const bgColor = (type === 'period') ? 'rgba(229, 152, 155, 0.5)' : getVibgyoColor(val);

            const div = document.createElement('div');
            div.className = 'entry-row';
            div.style.backgroundColor = bgColor;
            div.setAttribute('data-val', type === 'period' ? 'P' : val);

            div.innerHTML = `
                <div class="day-info">${dateStr}<br><small>${type === 'period' ? 'CYCLE' : 'LEVEL: '+val}</small></div>
                <div class="content-area" contenteditable="true" oninput="saveAndAnalyze()">...</div>
                <button class="delete-btn" onclick="this.parentElement.remove(); saveAndAnalyze();">×</button>
            `;
            container.prepend(div);
            saveAndAnalyze();
        }

        function saveAndAnalyze() {
            localStorage.setItem('diary_vibgyo', container.innerHTML);
            const rows = document.querySelectorAll('.entry-row');
            let totalMood = 0;
            let moodCount = 0;
            let lastPeriod = "None";

            rows.forEach((row, index) => {
                const val = row.getAttribute('data-val');
                if(val === 'P' && lastPeriod === "None") {
                    lastPeriod = row.querySelector('.day-info').innerText.split('\n')[0];
                } else if (val !== 'P') {
                    totalMood += parseInt(val);
                    moodCount++;
                }
            });

            const avg = moodCount > 0 ? Math.round(totalMood / moodCount) : 0;
            document.getElementById('stats-content').innerHTML = `
                Avg Motivation: <b>${avg}%</b> | Last Period Start: <b>${lastPeriod}</b><br>
                <em>Summary: You are currently trending in the <b>${getMoodName(avg)}</b> zone.</em>
            `;
        }

        function getMoodName(avg) {
            if(avg < 30) return "Violet/Blue (Reflective)";
            if(avg < 70) return "Green/Yellow (Balanced)";
            return "Orange/Red (High Performance)";
        }

        window.onload = () => {
            const saved = localStorage.getItem('diary_vibgyo');
            if(saved) container.innerHTML = saved;
            saveAndAnalyze();
        };
    </script>
</body>
</html>
