<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Research & Life Tracker</title>
    <style>
        :root {
            --sage-green: #b2ac88;
            --grid-color: #e8e8e8;
            --text-main: #555;
            --period-color: rgba(239, 154, 154, 0.7);
        }

        body {
            background-color: #faf9f6;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 25px 25px;
            font-family: 'Georgia', serif;
            color: var(--text-main);
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--sage-green); padding-bottom: 10px; width: 100%; max-width: 600px; }
        .container { width: 100%; max-width: 600px; padding-bottom: 150px; }

        .entry-row { 
            display: flex; align-items: flex-start; margin-bottom: 15px; padding: 15px; 
            border-radius: 12px; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .day-info { font-weight: bold; min-width: 80px; font-size: 0.85rem; opacity: 0.8; }
        .content-area { flex-grow: 1; outline: none; padding-left: 15px; min-height: 24px; font-size: 1rem; }

        .delete-btn {
            cursor: pointer; font-size: 1.2rem; color: #999; margin-left: 10px;
            transition: 0.2s; border: none; background: none;
        }
        .delete-btn:hover { color: #e5989b; }

        /* UI Controls Area */
        .controls-panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(250, 249, 246, 0.95);
            padding: 20px; border-top: 1px solid var(--sage-green);
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
        }

        .slider-container { width: 80%; max-width: 400px; text-align: center; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--sage-green); }

        .btn-group { display: flex; gap: 10px; }
        button { 
            padding: 10px 20px; border-radius: 20px; border: none; cursor: pointer; 
            font-weight: bold; background: var(--sage-green); color: white;
        }
        .btn-period { background: #e5989b; }

        #analysis {
            margin-bottom: 20px; padding: 15px; background: white;
            border: 1px solid var(--sage-green); border-radius: 10px;
            width: 100%; max-width: 550px; font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="color: var(--sage-green); margin: 0;">Monthly Cycle & Mindset</h2>
    </div>

    <div id="analysis">
        <p id="stats-text">Loading insights...</p>
    </div>

    <div class="container" id="diary-container"></div>

    <div class="controls-panel">
        <div class="slider-container">
            <small>Motivation Spectrum: <span id="val">Mid</span></small><br>
            <input type="range" id="motivationRange" min="0" max="100" value="50" oninput="updateSliderLabel(this.value)">
        </div>
        <div class="btn-group">
            <button onclick="addEntry('mood')">Add Log</button>
            <button class="btn-period" onclick="addEntry('period')">+ Period Day</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('diary-container');

        function updateSliderLabel(val) {
            let label = "Mid";
            if(val < 30) label = "Resting/Low";
            if(val > 70) label = "High Energy";
            document.getElementById('val').innerText = label;
        }

        function getColor(value) {
            // Transitions from Blue (low) to Sage (high)
            const r = Math.floor(144 + (178 - 144) * (value / 100));
            const g = Math.floor(202 + (172 - 202) * (value / 100));
            const b = Math.floor(249 + (136 - 249) * (value / 100));
            return `rgba(${r}, ${g}, ${b}, 0.6)`;
        }

        function addEntry(type) {
            const date = new Date();
            const dateStr = date.toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short' });
            
            const div = document.createElement('div');
            div.className = 'entry-row';
            
            const val = document.getElementById('motivationRange').value;
            const bgColor = (type === 'period') ? 'var(--period-color)' : getColor(val);

            div.style.backgroundColor = bgColor;
            div.innerHTML = `
                <div class="day-info">${dateStr}</div>
                <div class="content-area" contenteditable="true" oninput="saveAndAnalyze()">...</div>
                <button class="delete-btn" onclick="this.parentElement.remove(); saveAndAnalyze();">×</button>
            `;
            
            container.prepend(div);
            saveAndAnalyze();
        }

        function saveAndAnalyze() {
            localStorage.setItem('diary_v3', container.innerHTML);
            const entries = document.querySelectorAll('.entry-row').length;
            document.getElementById('stats-text').innerHTML = `Total Logged Days: <b>${entries}</b>. Tap the × to remove any errors.`;
        }

        window.onload = () => {
            const saved = localStorage.getItem('diary_v3');
            if(saved) container.innerHTML = saved;
            saveAndAnalyze();
        };
    </script>
</body>
</html>
